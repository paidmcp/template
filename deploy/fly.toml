app = "your-paid-mcp"
primary_region = "mad"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 4021
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "data"
  destination = "/app/data"

[env]
  DB_PATH = "/app/data/paidmcp.db"
